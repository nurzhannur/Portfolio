<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Password Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #6B73FF 0%, #000DFF 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    width: 400px;
    text-align: center;
}

h1 {
    margin-bottom: 25px;
    color: #333;
    font-weight: 600;
}

.password-container {
    display: flex;
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}

.password-container input {
    flex: 1;
    padding: 12px 15px;
    border: none;
    font-size: 16px;
    outline: none;
}

.password-container button {
    padding: 12px 20px;
    border: none;
    background: #FF6B6B;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

.password-container button:hover {
    background: #FF3B3B;
}

button#generateBtn {
    padding: 14px 25px;
    font-size: 16px;
    background: #1DD1A1;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    width: 100%;
}

button#generateBtn:hover {
    background: #10A374;
}

::selection {
    background: #1DD1A1;
    color: #fff;
}
</style>
</head>
<body>
<div class="container">
    <h1>Secure Password Generator</h1>
    <div class="password-container">
        <input type="text" id="password" readonly placeholder="Your password will appear here">
        <button id="copyBtn">Copy</button>
    </div>
    <button id="generateBtn">Generate Password</button>
</div>

<script>
const passwordEl = document.getElementById("password");
const generateBtn = document.getElementById("generateBtn");
const copyBtn = document.getElementById("copyBtn");

const randomFunc = {
    lower: () => String.fromCharCode(Math.floor(Math.random() * 26) + 97),
    upper: () => String.fromCharCode(Math.floor(Math.random() * 26) + 65),
    number: () => String.fromCharCode(Math.floor(Math.random() * 10) + 48),
    symbol: () => "!@#$%^&*(){}[]=<>/,.|~?".charAt(Math.floor(Math.random() * 20))
};

function generatePassword(length = 15) {
    if(length < 15) length = 15;

    let password = "";

    // Ensure at least one of each type
    password += randomFunc.lower();
    password += randomFunc.upper();
    password += randomFunc.number();
    password += randomFunc.symbol();

    const types = ["lower","upper","number","symbol"];
    while(password.length < length) {
        const type = types[Math.floor(Math.random() * types.length)];
        password += randomFunc[type]();
    }

    password = password.split('').sort(() => Math.random() - 0.5).join('');

    return password;
}

generateBtn.addEventListener("click", () => {
    passwordEl.value = generatePassword(15);
});

copyBtn.addEventListener("click", () => {
    if(!passwordEl.value) return;
    passwordEl.select();
    document.execCommand("copy");
    alert("Password copied to clipboard!");
});
</script>
</body>
</html>
