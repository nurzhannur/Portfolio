<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Menyembunyikan konten utama sebelum password benar */
        #main-content { display: none; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; color: #333; }
        .lock-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #4285f4; color: white; }
        .lock-screen i { font-size: 50px; margin-bottom: 20px; }
        
        header { background: white; padding: 15px 25px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        header h1 { font-size: 20px; margin-left: 10px; color: #4285f4; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .item { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .fa-folder { color: #ffca28; }
        .item p { margin: 5px 0 0; font-size: 14px; }
    </style>
</head>
<body>

    <div id="lock" class="lock-screen">
        <i class="fas fa-lock"></i>
        <h2>Akses Terbatas</h2>
        <p>Masukkan password untuk melihat file</p>
        <button onclick="checkPassword()" style="padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; color: #4285f4;">Input Password</button>
    </div>

    <div id="main-content">
        <header>
            <i class="fas fa-cloud fa-2x" style="color: #4285f4;"></i>
            <h1>NurCloud Private</h1>
        </header>

        <div class="container">
            <p style="color: #666;">Drive Saya > Rahasia</p>
            <div class="grid">
                <div class="item"><i class="fas fa-folder fa-3x"></i><p>Dokumen_Pribadi</p></div>
                <div class="item"><i class="fas fa-folder fa-3x"></i><p>Foto_Keluarga</p></div>
                <div class="item"><i class="fas fa-folder fa-3x"></i><p>Arsip_Penting</p></div>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            // Ganti '12345' dengan password yang kamu mau
            var password = prompt("Masukkan Password:");
            
            if (password == "?-9+Z2j7n!$1fXy") {
                document.getElementById("main-content").style.display = "block";
                document.getElementById("lock").style.display = "none";
            } else {
                alert("Password Salah! Akses ditolak.");
            }
        }
    </script>

</body>
</html>
