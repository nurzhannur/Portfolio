<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Steganos Challenge</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --shadow-glow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: var(--shadow-glow);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 10px;
            animation: flicker 2s infinite;
        }

        .header p {
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* The Puzzle Container */
        .viewport {
            position: relative;
            width: 320px;
            height: 320px;
            border: 1px solid var(--neon-green);
            box-shadow: var(--shadow-glow);
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .noise-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGLeE/giphy.gif') center/cover;
            opacity: 0.15;
            filter: grayscale(1) contrast(1.5);
            pointer-events: none;
        }

        /* Hidden Cipher Text */
        .cipher-layer {
            z-index: 10;
            font-size: 12px;
            color: #111; /* Hidden by blending with background */
            user-select: none;
            transition: 0.2s;
            text-align: center;
            padding: 20px;
        }

        /* Visual Hint: Changes color on hold */
        .viewport:active .cipher-layer {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* Input Area */
        .input-section {
            margin-top: 40px;
            width: 320px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: var(--neon-green);
            padding: 10px 0;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-bottom-color: var(--neon-green);
        }

        button {
            margin-top: 20px;
            width: 100%;
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            box-shadow: 0 0 20px white;
        }

        #status {
            margin-top: 15px;
            font-size: 0.8rem;
            height: 20px;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header">
        <h1>LEVEL_01</h1>
        <p>RECOVER THE HIDDEN PROTOCOL</p>
    </div>

    <div class="viewport">
        <div class="noise-bg"></div>
        <div class="cipher-layer">
            ANALYZING DATA... <br>
            BIT_STREAM_CORRUPTED <br><br>
            KEY_FOUND: <br>
            <strong>CYBER{N3XU5_CR4CK_2026}</strong>
        </div>
    </div>

    <div class="input-section">
        <input type="text" id="flagInput" placeholder="ENTER ACCESS KEY..." autocomplete="off">
        <button onclick="validate()">Authorize Access</button>
        <div id="status"></div>
    </div>

    <script>
        function validate() {
            const input = document.getElementById('flagInput').value;
            const status = document.getElementById('status');
            const target = "CYBER{N3XU5_CR4CK_2026}";

            if (input === target) {
                status.style.color = "cyan";
                status.innerText = "> ACCESS GRANTED. DECRYPTING FILES...";
                setTimeout(() => {
                    alert("PROTOCOL UNLOCKED: Level 1 Clear.");
                    // You can link to your Cloud website here!
                }, 1000);
            } else {
                status.style.color = "#ff4d4d";
                status.innerText = "> ACCESS DENIED. INVALID CREDENTIALS.";
                // Clear input
                document.getElementById('flagInput').value = "";
            }
        }
    </script>
</body>
  </html>
