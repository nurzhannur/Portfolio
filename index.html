<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Protected Cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding-top:100px; background:#f4f4f4;">
    <div id="login-container">
        <h2>🔒 Terkunci</h2>
        <input type="password" id="pass" placeholder="Password" style="padding:10px; border-radius:5px; border:1px solid #ddd;"><br><br>
        <button onclick="unlock()" style="padding:10px 20px; background:#4285f4; color:white; border:none; border-radius:5px;">Buka Akses</button>
    </div>

    <input type="hidden" id="encrypted-data" value="ff7156b5334650d256a0e96e9c1caab6fa581c9be8129212bf7b0dfacbf5e7f0U2FsdGVkX1">

    <script>
        function unlock() {
            var pass = document.getElementById('pass').value;
            var encrypted = document.getElementById('encrypted-data').value;
            try {
                var decrypted = CryptoJS.AES.decrypt(encrypted, pass).toString(CryptoJS.enc.Utf8);
                if (decrypted) {
                    document.write(decrypted);
                    document.close();
                } else {
                    alert("Password Salah!");
                }
            } catch (e) {
                alert("Password Salah!");
            }
        }
    </script>
</body>
</html>
