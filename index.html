<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | LEVEL 01</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Efek Background Matrix */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff41;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px #00ff41;
            width: 90%;
            max-width: 400px;
        }

        .screen {
            width: 100%;
            height: 150px;
            background: #050505;
            border: 1px solid #004400;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Pesan Rahasia */
        .secret {
            color: #010801; /* Nyaris hitam pekat */
            font-size: 14px;
            user-select: none;
            transition: 0.1s;
        }

        /* Nyala saat ditekan lama (HP) atau klik tahan */
        .screen:active .secret {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
            font-size: 18px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #004400;
            color: #00ff41;
            padding: 10px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }

        button:hover { background: #fff; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <h2 style="letter-spacing: 5px;">LEVEL_01</h2>
        <p style="font-size: 0.8rem; color: #008800;">TEMUKAN PROTOKOL TERSEMBUNYI</p>

        <div class="screen">
            <div class="secret">
                STATUS: ENCRYPTED<br>
                CORE_VAL: 100293<br><br>
                KUNCI_AKSES:<br>
                <strong>MERDEKA_2026</strong>
            </div>
        </div>

        <input type="text" id="flag" placeholder="MASUKKAN KUNCI..." autocomplete="off">
        <button onclick="cek()">OTORISASI</button>
    </div>

    <script>
        // Efek Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        // Logika Cek Jawaban
        function cek() {
            const val = document.getElementById('flag').value;
            if (val === "MERDEKA_2026") {
                alert("AKSES DITERIMA! Sistem Terbuka.");
            } else {
                alert("KUNCI SALAH!");
            }
        }
    </script>
</body>
</html>
